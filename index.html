<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findly - Buscador de Stock</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Findly</h1>
            <p>Buscador de stock para Cerdanya y Sonepar</p>
        </header>

        <section class="input-section">
            <div class="input-tabs">
                <button id="manualTab" class="tab-btn active">Manual</button>
                <button id="uploadTab" class="tab-btn">Subir Excel</button>
            </div>

            <div id="manualInputContainer" class="input-container">
                <textarea id="refInput" placeholder="Pega aquí el listado de referencias (una por línea)..."></textarea>
            </div>

            <div id="uploadInputContainer" class="input-container hidden">
                <div class="file-drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept=".xlsx, .xls" hidden>
                    <p>Arrastra tu Excel aquí o <span class="browse">selecciona un archivo</span></p>
                    <div id="fileInfo" class="hidden">
                        <span class="file-name"></span>
                        <button id="clearFile" class="btn-icon">×</button>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="searchBtn" class="btn-primary">Buscar Stock</button>
                <div class="export-actions">
                    <button id="exportStockBtn" class="btn-secondary" disabled>Exportar Stock</button>
                    <button id="exportPurchaseBtn" class="btn-purchase" disabled>Exportar Compra</button>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="results-grid">
                <div class="result-card">
                    <h2>Inventario Cerdanya</h2>
                    <div class="table-container">
                        <table id="invTable">
                            <thead>
                                <tr>
                                    <th>Referencia</th>
                                    <th>Ubicación</th>
                                    <th>Cantidad</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="result-card">
                    <h2>Stock Sonepar</h2>
                    <div class="table-container">
                        <table id="sonTable">
                            <thead>
                                <tr>
                                    <th>Referencia</th>
                                    <th>Empresa</th>
                                    <th>Cantidad</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="result-card purchase-card">
                    <h2>
                        <svg class="icon-basket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 10V4a2 2 0 012-2h8a2 2 0 012 2v6" />
                            <path d="M21 15H3l2-5h14l2 5z" />
                            <path d="M3 15v4a2 2 0 002 2h14a2 2 0 002-2v-4" />
                            <path d="M12 11v10" />
                        </svg>
                        Listado de Compra
                    </h2>
                    <div class="table-container">
                        <table id="purchaseTable">
                            <thead>
                                <tr>
                                    <th>Referencia</th>
                                    <th>Pedido</th>
                                    <th>Faltan</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>

</html>
