<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findly - Buscador de Stock</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Findly</h1>
            <p>Buscador de stock para Cerdanya y Sonepar</p>
        </header>

        <section class="input-section">
            <div class="input-tabs">
                <button id="manualTab" class="tab-btn">Manual</button>
                <button id="uploadTab" class="tab-btn active">Subir Excel</button>
            </div>

            <div id="manualInputContainer" class="input-container hidden">
                <textarea id="refInput" placeholder="Pega aquí el listado de referencias (una por línea)..."></textarea>
            </div>

            <div id="uploadInputContainer" class="input-container">
                <div class="file-drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept=".xlsx, .xls" hidden>
                    <p>Arrastra tu Excel aquí o <span class="browse">selecciona un archivo</span></p>
                    <div id="fileInfo" class="hidden">
                        <span class="file-name"></span>
                        <button id="clearFile" class="btn-icon">×</button>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="searchBtn" class="btn-primary">Buscar Stock</button>
                <div class="export-actions">
                    <button id="exportStockBtn" class="btn-secondary" disabled>Exportar Stock</button>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="legend-container">
                <div class="legend-item">
                    <div class="legend-box common"></div>
                    <span>Referencia existente en ambos stocks</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box encargo"></div>
                    <span>Cant. Encargo (Pedido total)</span>
                </div>
            </div>
            <div class="results-grid">
                <div class="result-card">
                    <h2>Inventario Cerdanya</h2>
                    <div class="table-container">
                        <table id="invTable">
                            <thead>
                                <tr>
                                    <th>Referencia</th>
                                    <th>Ubicación</th>
                                    <th>Cantidad</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="result-card">
                    <h2>Stock Sonepar</h2>
                    <div class="table-container">
                        <table id="sonTable">
                            <thead>
                                <tr>
                                    <th>Referencia</th>
                                    <th>Empresa</th>
                                    <th>Cantidad</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="result-card sti-card">
                    <h2>
                        <svg class="icon-basket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="15" rx="2" ry="2"/>
                            <path d="M16 7V5a2 2 0 00-4 0v2"/>
                            <path d="M8 7V5a2 2 0 014 0"/>
                            <line x1="12" y1="12" x2="12" y2="16"/>
                            <line x1="10" y1="14" x2="14" y2="14"/>
                        </svg>
                        Stock STI
                    </h2>
                    <div class="table-container">
                        <table id="stiTable">
                            <thead>
                                <tr>
                                    <th>Referencia</th>
                                    <th>En STI</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>

</html>
